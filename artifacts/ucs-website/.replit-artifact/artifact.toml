kind = "web"
previewPath = "/"
title = "United Construction Services Inc"
version = "1.0.0"
id = "artifacts/ucs-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18281

[services.development]
run = "pnpm --filter @workspace/ucs-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ucs-website", "run", "build" ]
publicDir = "artifacts/ucs-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18281"
BASE_PATH = "/"
